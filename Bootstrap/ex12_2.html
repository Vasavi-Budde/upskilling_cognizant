<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body>

        <div class="row">

            <div class="col-md-4 mb-4">

                <div class="card p-4 text-center">

                    <h3>Basic</h3>

                    <h4>₹499</h4>

                    <button class="btn btn-primary">
                        Buy Now

                </div>

            </div>

            <div class="col-md-4 mb-4">

                    <h3>Standard</h3>

                    <button class="btn btn-success">

                    </button>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card p-4 text-center">

                    <h3>Premium</h3>

                    <h4>₹1499</h4>

                    <button class="btn btn-danger">

                    </button>

                </div>
