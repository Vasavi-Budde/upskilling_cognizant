<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Structure</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-5">

        <h2 class="text-primary">
            Bootstrap Folder Structure
        </h2>

        <div class="card p-4 mt-3">

            <h4>CSS Folder</h4>
            <p>
                Contains Bootstrap styling files used for colors,
                layouts, buttons and forms.
            </p>

            <h4>JS Folder</h4>
            <p>
                Contains JavaScript files required for modals,
                accordions, dropdowns and other interactive components.
            </p>

            <h4>Icons Folder</h4>
            <p>
                Contains Bootstrap icon files used in web pages.
            </p>

        </div>

    </div>

</body>

</html>
